<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boletería - Circo Real de México</title>
    <style>
        :root {
            --color-primary: #f99aaa;
            --color-white: #ffffff;
            --color-light-gray: #f5f5f5;
            --color-black: #000000;
            --color-dark-gray: #777;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background-color: var(--color-light-gray);
            color: var(--color-black);
            line-height: 1.6;
            padding: 20px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        
        .top-bar {
            background-color: var(--color-black);
            color: var(--color-white);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-radius: 8px;
        }
        
        .showpass {
            font-weight: bold;
            font-size: 20px;
            letter-spacing: 1px;
        }
        
        .profile {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        
        .profile-icon {
            width: 35px;
            height: 35px;
            background-color: var(--color-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        
        .breadcrumb {
            margin-bottom: 20px;
            font-size: 14px;
            color: var(--color-dark-gray);
        }
        
        .breadcrumb a {
            color: var(--color-primary);
            text-decoration: none;
        }
        
        .breadcrumb a:hover {
            text-decoration: underline;
        }
        
        .container {
            max-width: 1000px; 
            margin: 0 auto;
            background-color: var(--color-white);
            padding: 40px; 
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            flex-grow: 1;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 40px; 
            color: var(--color-black);
            font-size: 36px;
        }
        
        .form-group {
            margin-bottom: 30px; 
        }
        
        label {
            display: block;
            margin-bottom: 10px; 
            font-weight: 500;
            color: var(--color-black);
            font-size: 18px;
        }
        
        input[type="date"],
        select,
        input[type="number"] {
            width: 100%;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background-color: var(--color-light-gray);
            color: var(--color-black);
            font-size: 18px;
        }
        
        .calculation-row {
            display: flex;
            gap: 20px;
            margin-bottom: 15px; 
        }
        
        .calculation-box {
            flex: 1;
            background-color: var(--color-light-gray);
            padding: 20px; 
            border-radius: 5px;
            text-align: center;
        }
        
        .calculation-label {
            font-size: 16px; 
            color: var(--color-dark-gray);
            margin-bottom: 8px; 
        }
        
        .calculation-value {
            font-size: 22px; 
            font-weight: bold;
            color: var(--color-black);
        }
        
        .btn-comprar {
            width: 100%;
            padding: 20px;
            background-color: var(--color-primary);
            color: var(--color-black);
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 20px; 
            margin-top: 30px; 
            transition: background-color 0.3s;
        }
        
        .btn-comprar:hover {
            background-color: #f88a9d;
        }
        
        footer {
            background-color: var(--color-primary);
            padding: 30px 20px;
            text-align: center;
            margin-top: 30px;
            border-radius: 8px;
        }
        
        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .social-section {
            margin-bottom: 20px;
            width: 100%;
        }
        
        .social-section h2 {
            font-size: 24px;
            margin-bottom: 25px;
            color: var(--color-black);
            border-bottom: 2px solid var(--color-black);
            padding-bottom: 10px;
            display: inline-block;
        }
        
        .social-links {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .social-link {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--color-black);
            text-decoration: none;
            padding: 15px;
            background-color: var(--color-white);
            border-radius: 8px;
            transition: transform 0.3s, background-color 0.3s;
            min-width: 120px;
        }
        
        .social-link:hover {
            background-color: var(--color-light-gray);
            transform: translateY(-5px);
        }
        
        .social-icon {
            font-size: 30px;
            margin-bottom: 10px;
        }
        
        .copyright {
            color: var(--color-black);
            font-weight: 500;
            border-top: 1px solid var(--color-black);
            padding-top: 20px;
            width: 100%;
        }
        
        @media (max-width: 768px) {
            .calculation-row {
                flex-direction: column;
            }
            
            .social-links {
                gap: 10px;
            }
            
            .social-link {
                min-width: 100px;
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="showpass">SHOWPA$$</div>
        <div class="profile">
            <div class="profile-icon">U</div>
            <span>Perfil</span>
        </div>
    </div>
    
    <div class="breadcrumb">
        <a href="3paginaprincipal.html">Home</a> > Boletería
    </div>
    
    <div class="container">
        <h1>BOLETERIA</h1>
        
        <div class="form-group">
            <label for="fecha">Fecha del evento</label>
            <input type="date" id="fecha" name="fecha">
        </div>
        
        <div class="form-group">
            <label for="silleteria">Tipo de silletería</label>
            <select id="silleteria" name="silleteria" onchange="calcularTotal()">
                <option value="" selected disabled>Seleccione una opción</option>
                <option value="normal">Normal</option>
                <option value="vip">VIP</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="cantidad">Cantidad boletas</label>
            <input type="number" id="cantidad" name="cantidad" min="1" value="1" onchange="calcularTotal()">
        </div>
        
        <div class="calculation-row">
            <div class="calculation-box">
                <div class="calculation-label">Valor unitario</div>
                <div class="calculation-value" id="valor-unitario">$0</div>
            </div>
            
            <div class="calculation-box">
                <div class="calculation-label">Valor total</div>
                <div class="calculation-value" id="valor-total">$0</div>
            </div>
        </div>
        
        <a href="5finalizarcompra.html" class="btn-comprar" style="text-decoration: none; display: block; text-align: center;">Comprar</a>
    </div>
    
    <footer>
        <div class="footer-content">
            <div class="social-section">
                <h2>Síguenos en Redes Sociales</h2>
                <div class="social-links">
                    <a href="#" class="social-link">
                        <span>Facebook</span>
                    </a>
                    <a href="#" class="social-link">
                        <span>Instagram</span>
                    </a>
                    <a href="#" class="social-link">
                        <span>Tiktok</span>
                    </a>
                    <a href="#" class="social-link">
                        <span>Teléfono</span>
                    </a>
                </div>
            </div>
        </div>
    </footer>

    <script>
        let precioNormal = 10000;
        let precioVIP = 15000;
        
        function calcularTotal() {
            const silleteria = document.getElementById('silleteria').value;
            const cantidad = parseInt(document.getElementById('cantidad').value) || 0;
            let valorUnitario = 0;
            
            if (silleteria === "normal") {
                valorUnitario = precioNormal;
            } else if (silleteria === "vip") {
                valorUnitario = precioVIP;
            }
            
            const valorTotal = cantidad * valorUnitario;
            
            document.getElementById('valor-unitario').textContent = `$${valorUnitario.toLocaleString()}`;
            document.getElementById('valor-total').textContent = `$${valorTotal.toLocaleString()}`;
        }
        
        // Inicializar cálculos
        calcularTotal();
    </script>
</body>
</html>
