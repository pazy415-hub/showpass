<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administrador - Circo Real de México</title>
    <style>
        :root {
            --color-primary: #f99aaa;
            --color-white: #ffffff;
            --color-light-gray: #f5f5f5;
            --color-black: #000000;
            --color-dark-gray: #777;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background-color: var(--color-light-gray);
            color: var(--color-black);
            line-height: 1.6;
            padding: 20px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        
        .top-bar {
            background-color: var(--color-black);
            color: var(--color-white);
            padding: 20px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-radius: 10px;
        }
        
        .showpass {
            font-weight: bold;
            font-size: 24px;
            letter-spacing: 1.5px;
        }
        
        .profile-section {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .notification-icon {
            width: 45px;
            height: 45px;
            background-color: var(--color-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            font-size: 20px;
        }
        
        .notification-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background-color: red;
            color: white;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .profile {
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
        }
        
        .profile-icon {
            width: 45px;
            height: 45px;
            background-color: var(--color-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            flex-grow: 1;
            width: 100%;
        }
        
        .welcome-section {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 25px;
        }
        
        .welcome-message {
            color: var(--color-dark-gray);
            font-size: 20px;
            font-style: italic;
            padding: 10px 20px;
            background-color: var(--color-white);
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        
        .panel-header {
            background-color: var(--color-primary);
            color: var(--color-black);
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 40px;
            text-align: center;
            width: 100%;
        }
        
        .panel-header h2 {
            font-size: 36px;
            font-weight: bold;
        }
        
        .admin-grid {
            display: flex;
            justify-content: space-between;
            gap: 30px;
            margin-bottom: 40px;
        }
        
        .admin-card {
            background-color: var(--color-white);
            padding: 35px 30px;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
            text-align: center;
            transition: transform 0.3s, box-shadow 0.3s;
            flex: 1;
            min-height: 220px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        .admin-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.2);
        }
        
        .card-icon {
            font-size: 60px;
            margin-bottom: 20px;
            color: var(--color-primary);
        }
        
        .card-title {
            font-size: 26px;
            font-weight: bold;
            color: var(--color-black);
        }
        
        .admin-modules {
            display: flex;
            justify-content: space-between;
            gap: 30px;
        }
        
        footer {
            background-color: var(--color-primary);
            padding: 40px 30px;
            text-align: center;
            margin-top: 50px;
            border-radius: 12px;
        }
        
        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .social-section {
            margin-bottom: 25px;
            width: 100%;
        }
        
        .social-section h2 {
            font-size: 28px;
            margin-bottom: 30px;
            color: var(--color-black);
            border-bottom: 3px solid var(--color-black);
            padding-bottom: 15px;
            display: inline-block;
        }
        
        .social-links {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 25px;
            margin-bottom: 35px;
        }
        
        .social-link {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--color-black);
            text-decoration: none;
            padding: 20px;
            background-color: var(--color-white);
            border-radius: 10px;
            transition: transform 0.3s, background-color 0.3s;
            min-width: 140px;
        }
        
        .social-link:hover {
            background-color: var(--color-light-gray);
            transform: translateY(-5px);
        }
        
        .social-icon {
            font-size: 35px;
            margin-bottom: 15px;
        }
        
        .copyright {
            color: var(--color-black);
            font-weight: 500;
            border-top: 2px solid var(--color-black);
            padding-top: 25px;
            width: 100%;
            font-size: 18px;
        }
        
        @media (max-width: 968px) {
            .admin-grid,
            .admin-modules {
                flex-direction: column;
                gap: 25px;
            }
            
            .admin-card {
                min-height: 180px;
                padding: 30px 25px;
            }
            
            .card-icon {
                font-size: 50px;
            }
            
            .card-title {
                font-size: 22px;
            }
            
            .welcome-section {
                justify-content: center;
            }
        }
        
        @media (max-width: 768px) {
            .top-bar {
                padding: 15px 20px;
                flex-direction: column;
                gap: 15px;
            }
            
            .profile-section {
                gap: 15px;
            }
            
            .social-links {
                gap: 15px;
            }
            
            .social-link {
                min-width: 120px;
                padding: 15px;
            }
            
            .panel-header h2 {
                font-size: 30px;
            }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="showpass">SHOWPA$$</div>
        <div class="profile-section">
            <div class="notification-icon">
                🔔
                <div class="notification-badge">3</div>
            </div>
            <div class="profile">
                <div class="profile-icon">A</div>
                <span>Admin</span>
            </div>
        </div>
    </div>
    
    <div class="container">
        <div class="welcome-section">
            <div class="welcome-message">Welcome back</div>
        </div>
        
        <div class="panel-header">
            <h2>PANEL ADMINISTRADOR</h2>
        </div>
        
        <div class="admin-grid">
            <div class="admin-card">
                <a href="Ausuarios.html" class="admin-card">
                <div class="card-icon">👥</div>
                <div class="card-title">Usuarios</div>
                </a>
            </div>
            
            <div class="admin-card">
                <a href="Areportes.html" class="admin-card">
                <div class="card-icon">📊</div>
                <div class="card-title">Reportes</div>
                </a>
            </div>
            
            <div class="admin-card">
                <a href="apqrs.html" class="admin-card">
                <div class="card-icon">📋</div>
                <div class="card-title">PQRS</div>
                </a>
            </div>
        </div>
        
        <div class="admin-modules">
            <div class="admin-card">
                <a href="ABoleteria.html" class="admin-card">
                <div class="card-icon">🎫</div>
                <div class="card-title">Boleteria</div>
                </a>
            </div>
            
            <div class="admin-card">
                <a href="Anuncios.html" class="admin-card">
                <div class="card-icon">📢</div>
                <div class="card-title">Anuncios</div>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
