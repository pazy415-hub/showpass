<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Anuncios - Administración</title>
    <style>
        :root {
            --color-primary: #f99aaa;
            --color-white: #ffffff;
            --color-light-gray: #f5f5f5;
            --color-black: #000000;
            --color-dark-gray: #777;
            --color-success: #4caf50;
            --color-warning: #ff9800;
            --color-danger: #ff4757;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background-color: var(--color-light-gray);
            color: var(--color-black);
            line-height: 1.6;
            padding: 20px;
        }
        
        .top-bar {
            background-color: var(--color-black);
            color: var(--color-white);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-radius: 8px;
        }
        
        .showpass {
            font-weight: bold;
            font-size: 20px;
            letter-spacing: 1px;
        }
        
        .profile {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        
        .profile-icon {
            width: 35px;
            height: 35px;
            background-color: var(--color-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        
        .breadcrumb {
            margin-bottom: 20px;
            font-size: 14px;
            color: var(--color-dark-gray);
        }
        
        .breadcrumb a {
            color: var(--color-primary);
            text-decoration: none;
        }
        
        .breadcrumb a:hover {
            text-decoration: underline;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .panel-header {
            background-color: var(--color-primary);
            color: var(--color-black);
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .panel-header h1 {
            font-size: 32px;
            font-weight: bold;
        }
        
        .actions-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            background-color: var(--color-white);
            padding: 15px 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        
        .search-box {
            display: flex;
            gap: 10px;
        }
        
        .search-box input {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            width: 250px;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background-color: var(--color-primary);
            color: var(--color-black);
        }
        
        .btn-primary:hover {
            background-color: #f88a9d;
            transform: translateY(-2px);
        }
        
        .announcements-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }
        
        .announcement-card {
            background-color: var(--color-white);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s;
        }
        
        .announcement-card:hover {
            transform: translateY(-5px);
        }
        
        .announcement-header {
            padding: 20px;
            border-bottom: 1px solid var(--color-light-gray);
        }
        
        .announcement-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 5px;
            color: var(--color-black);
        }
        
        .announcement-date {
            font-size: 14px;
            color: var(--color-dark-gray);
        }
        
        .announcement-content {
            padding: 20px;
        }
        
        .announcement-description {
            margin-bottom: 15px;
            color: var(--color-dark-gray);
        }
        
        .announcement-status {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .status-active {
            background-color: var(--color-success);
            color: white;
        }
        
        .status-inactive {
            background-color: var(--color-warning);
            color: white;
        }
        
        .announcement-actions {
            padding: 15px 20px;
            background-color: var(--color-light-gray);
            display: flex;
            justify-content: space-between;
        }
        
        .action-btn {
            padding: 8px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .btn-edit {
            background-color: var(--color-primary);
            color: var(--color-black);
        }
        
        .btn-edit:hover {
            background-color: #f88a9d;
        }
        
        .btn-activate {
            background-color: var(--color-success);
            color: white;
        }
        
        .btn-activate:hover {
            background-color: #43a047;
        }
        
        .btn-deactivate {
            background-color: var(--color-warning);
            color: white;
        }
        
        .btn-deactivate:hover {
            background-color: #f57c00;
        }
        
        .btn-delete {
            background-color: var(--color-danger);
            color: white;
        }
        
        .btn-delete:hover {
            background-color: #d32f2f;
        }
        
        .create-announcement {
            background-color: var(--color-white);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }
        
        .create-announcement h2 {
            margin-bottom: 20px;
            color: var(--color-black);
            border-bottom: 2px solid var(--color-primary);
            padding-bottom: 10px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--color-black);
        }
        
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background-color: var(--color-light-gray);
            color: var(--color-black);
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            border-color: var(--color-primary);
            outline: none;
        }
        
        .form-group textarea {
            min-height: 120px;
            resize: vertical;
        }
        
        .form-row {
            display: flex;
            gap: 20px;
        }
        
        .form-row .form-group {
            flex: 1;
        }
        
        footer {
            background-color: var(--color-primary);
            padding: 30px 20px;
            text-align: center;
            margin-top: 50px;
            border-radius: 8px;
        }
        
        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .social-section {
            margin-bottom: 20px;
            width: 100%;
        }
        
        .social-section h2 {
            font-size: 24px;
            margin-bottom: 25px;
            color: var(--color-black);
            border-bottom: 2px solid var(--color-black);
            padding-bottom: 10px;
            display: inline-block;
        }
        
        .social-links {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .social-link {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--color-black);
            text-decoration: none;
            padding: 15px;
            background-color: var(--color-white);
            border-radius: 8px;
            transition: transform 0.3s, background-color 0.3s;
            min-width: 120px;
        }
        
        .social-link:hover {
            background-color: var(--color-light-gray);
            transform: translateY(-5px);
        }
        
        .social-icon {
            font-size: 30px;
            margin-bottom: 10px;
        }
        
        .copyright {
            color: var(--color-black);
            font-weight: 500;
            border-top: 1px solid var(--color-black);
            padding-top: 20px;
            width: 100%;
        }
        
        /* Modal de edición */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal-content {
            background-color: var(--color-white);
            padding: 30px;
            border-radius: 10px;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 5px 25px rgba(0, 0, 0, 0.2);
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--color-primary);
        }
        
        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--color-dark-gray);
        }
        
        @media (max-width: 768px) {
            .actions-bar {
                flex-direction: column;
                gap: 15px;
            }
            
            .search-box {
                width: 100%;
            }
            
            .search-box input {
                width: 100%;
            }
            
            .announcements-grid {
                grid-template-columns: 1fr;
            }
            
            .form-row {
                flex-direction: column;
                gap: 0;
            }
            
            .social-links {
                gap: 10px;
            }
            
            .social-link {
                min-width: 100px;
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="showpass">SHOWPA$$</div>
        <div class="profile">
            <div class="profile-icon">A</div>
            <span>Admin</span>
        </div>
    </div>
    
    <div class="breadcrumb">
        <a href="Apanel.html">Panel de control</a> > Anuncios
    </div>
    
    <div class="container">
        <div class="panel-header">
            <h1>PANEL DE ANUNCIOS</h1>
        </div>
        
        <div class="actions-bar">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Buscar anuncios...">
                <button class="btn btn-primary" onclick="searchAnnouncements()">Buscar</button>
            </div>
            <button class="btn btn-primary" onclick="showCreateForm()">+ Nuevo Anuncio</button>
        </div>
        
        <div class="announcements-grid" id="announcementsGrid">
            <!-- Los anuncios se cargarán dinámicamente con JavaScript -->
        </div>
        
        <div class="create-announcement" id="createForm">
            <h2>Crear Nuevo Anuncio</h2>
            <div class="form-row">
                <div class="form-group">
                    <label for="announcement-title">Título del anuncio *</label>
                    <input type="text" id="announcement-title" placeholder="Ej: Promoción Especial" required>
                </div>
                <div class="form-group">
                    <label for="announcement-status">Estado</label>
                    <select id="announcement-status">
                        <option value="active">Activo</option>
                        <option value="inactive">Inactivo</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label for="announcement-description">Descripción *</label>
                <textarea id="announcement-description" placeholder="Describe el contenido del anuncio..." required></textarea>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="start-date">Fecha de inicio</label>
                    <input type="date" id="start-date">
                </div>
                <div class="form-group">
                    <label for="end-date">Fecha de fin</label>
                    <input type="date" id="end-date">
                </div>
            </div>
            <button class="btn btn-primary" onclick="createAnnouncement()">Publicar Anuncio</button>
        </div>
    </div>
    
    <!-- Modal de Edición -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Editar Anuncio</h2>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="edit-title">Título del anuncio *</label>
                    <input type="text" id="edit-title" required>
                </div>
                <div class="form-group">
                    <label for="edit-status">Estado</label>
                    <select id="edit-status">
                        <option value="active">Activo</option>
                        <option value="inactive">Inactivo</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label for="edit-description">Descripción *</label>
                <textarea id="edit-description" required></textarea>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="edit-start-date">Fecha de inicio</label>
                    <input type="date" id="edit-start-date">
                </div>
                <div class="form-group">
                    <label for="edit-end-date">Fecha de fin</label>
                    <input type="date" id="edit-end-date">
                </div>
            </div>
            <input type="hidden" id="edit-id">
            <button class="btn btn-primary" onclick="updateAnnouncement()">Guardar Cambios</button>
        </div>
    </div>
    
    <footer>
        <div class="footer-content">
            <div class="copyright">
                <p>&copy; 2025 Circo Real de México. Todos los derechos reservados.</p>
            </div>
        </div>
    </footer>

    <script>
        // Base de datos simulada de anuncios
        let announcements = [
            {
                id: 1,
                title: "Promoción 2x1 Viernes",
                description: "Todos los viernes de noviembre disfruta de nuestra función del terror con promoción 2x1.",
                status: "active",
                date: "15/11/2023",
                startDate: "2023-11-03",
                endDate: "2023-11-30"
            },
            {
                id: 2,
                title: "Función Especial Navidad",
                description: "Función especial navideña con actos únicos y sorpresas para toda la familia.",
                status: "active",
                date: "10/11/2023",
                startDate: "2023-12-15",
                endDate: "2023-12-25"
            },
            {
                id: 3,
                title: "Descuento Estudiantes",
                description: "30% de descuento para estudiantes con carnet vigente. Válido todos los días.",
                status: "inactive",
                date: "05/11/2023",
                startDate: "2023-11-01",
                endDate: "2023-11-30"
            },
            {
                id: 4,
                title: "Nuevo Acto Acrobático",
                description: "Estrenamos nuevo acto acrobático 'Los Voladores'. No te lo pierdas.",
                status: "active",
                date: "01/11/2023",
                startDate: "2023-11-01",
                endDate: "2023-12-15"
            }
        ];

        let nextId = 5;

        // Cargar anuncios al iniciar
        document.addEventListener('DOMContentLoaded', function() {
            renderAnnouncements();
            // Establecer fecha mínima para los date inputs
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('start-date').min = today;
            document.getElementById('end-date').min = today;
        });

        // Mostrar/ocultar formulario de creación
        function showCreateForm() {
            const form = document.getElementById('createForm');
            form.style.display = form.style.display === 'none' ? 'block' : 'block';
        }

        // Renderizar anuncios en el grid
        function renderAnnouncements(filteredAnnouncements = null) {
            const grid = document.getElementById('announcementsGrid');
            const announcementsToRender = filteredAnnouncements || announcements;
            
            grid.innerHTML = '';
            
            if (announcementsToRender.length === 0) {
                grid.innerHTML = '<p class="no-results">No se encontraron anuncios.</p>';
                return;
            }
            
            announcementsToRender.forEach(announcement => {
                const card = document.createElement('div');
                card.className = 'announcement-card';
                card.innerHTML = `
                    <div class="announcement-header">
                        <div class="announcement-title">${announcement.title}</div>
                        <div class="announcement-date">Publicado: ${announcement.date}</div>
                    </div>
                    <div class="announcement-content">
                        <p class="announcement-description">${announcement.description}</p>
                        <span class="announcement-status ${announcement.status === 'active' ? 'status-active' : 'status-inactive'}">
                            ${announcement.status === 'active' ? 'Activo' : 'Inactivo'}
                        </span>
                    </div>
                    <div class="announcement-actions">
                        <button class="action-btn btn-edit" onclick="editAnnouncement(${announcement.id})">Editar</button>
                        ${announcement.status === 'active' ? 
                            `<button class="action-btn btn-deactivate" onclick="toggleStatus(${announcement.id})">Desactivar</button>` : 
                            `<button class="action-btn btn-activate" onclick="toggleStatus(${announcement.id})">Activar</button>`
                        }
                        <button class="action-btn btn-delete" onclick="deleteAnnouncement(${announcement.id})">Eliminar</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Crear nuevo anuncio
        function createAnnouncement() {
            const title = document.getElementById('announcement-title').value;
            const description = document.getElementById('announcement-description').value;
            const status = document.getElementById('announcement-status').value;
            const startDate = document.getElementById('start-date').value;
            const endDate = document.getElementById('end-date').value;
            
            if (!title || !description) {
                alert('Por favor, complete todos los campos obligatorios.');
                return;
            }
            
            const newAnnouncement = {
                id: nextId++,
                title: title,
                description: description,
                status: status,
                date: new Date().toLocaleDateString('es-ES'),
                startDate: startDate,
                endDate: endDate
            };
            
            announcements.push(newAnnouncement);
            renderAnnouncements();
            
            // Limpiar formulario
            document.getElementById('announcement-title').value = '';
            document.getElementById('announcement-description').value = '';
            document.getElementById('announcement-status').value = 'active';
            document.getElementById('start-date').value = '';
            document.getElementById('end-date').value = '';
            
            alert('Anuncio creado exitosamente!');
        }

        // Editar anuncio
        function editAnnouncement(id) {
            const announcement = announcements.find(a => a.id === id);
            if (!announcement) return;
            
            document.getElementById('edit-id').value = announcement.id;
            document.getElementById('edit-title').value = announcement.title;
            document.getElementById('edit-description').value = announcement.description;
            document.getElementById('edit-status').value = announcement.status;
            document.getElementById('edit-start-date').value = announcement.startDate;
            document.getElementById('edit-end-date').value = announcement.endDate;
            
            document.getElementById('editModal').style.display = 'flex';
        }

        // Actualizar anuncio
        function updateAnnouncement() {
            const id = parseInt(document.getElementById('edit-id').value);
            const title = document.getElementById('edit-title').value;
            const description = document.getElementById('edit-description').value;
            const status = document.getElementById('edit-status').value;
            const startDate = document.getElementById('edit-start-date').value;
            const endDate = document.getElementById('edit-end-date').value;
            
            if (!title || !description) {
                alert('Por favor, complete todos los campos obligatorios.');
                return;
            }
            
            const index = announcements.findIndex(a => a.id === id);
            if (index !== -1) {
                announcements[index] = {
                    ...announcements[index],
                    title: title,
                    description: description,
                    status: status,
                    startDate: startDate,
                    endDate: endDate
                };
                
                renderAnnouncements();
                closeModal();
                alert('Anuncio actualizado exitosamente!');
            }
        }

        // Cambiar estado (activar/desactivar)
        function toggleStatus(id) {
            const index = announcements.findIndex(a => a.id === id);
            if (index !== -1) {
                announcements[index].status = announcements[index].status === 'active' ? 'inactive' : 'active';
                renderAnnouncements();
            }
        }

        // Eliminar anuncio
        function deleteAnnouncement(id) {
            if (confirm('¿Está seguro de que desea eliminar este anuncio?')) {
                announcements = announcements.filter(a => a.id !== id);
                renderAnnouncements();
                alert('Anuncio eliminado exitosamente!');
            }
        }

        // Buscar anuncios
        function searchAnnouncements() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            if (!searchTerm) {
                renderAnnouncements();
                return;
            }
            
            const filtered = announcements.filter(a => 
                a.title.toLowerCase().includes(searchTerm) || 
                a.description.toLowerCase().includes(searchTerm)
            );
            
            renderAnnouncements(filtered);
        }

        // Cerrar modal
        function closeModal() {
            document.getElementById('editModal').style.display = 'none';
        }

        // Cerrar modal al hacer clic fuera
        window.onclick = function(event) {
            const modal = document.getElementById('editModal');
            if (event.target === modal) {
                closeModal();
            }
        };
    </script>
</body>
</html>
