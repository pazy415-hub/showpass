<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PQRS - Circo Real de México</title>
    <style>
        :root {
            --color-primary: #f99aaa;
            --color-white: #ffffff;
            --color-light-gray: #f5f5f5;
            --color-black: #000000;
            --color-dark-gray: #777;
            --color-success: #4caf50;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background-color: var(--color-light-gray);
            color: var(--color-black);
            line-height: 1.6;
            padding: 20px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        
        .top-bar {
            background-color: var(--color-black);
            color: var(--color-white);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-radius: 8px;
        }
        
        .showpass {
            font-weight: bold;
            font-size: 20px;
            letter-spacing: 1px;
        }
        
        .profile {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        
        .profile-icon {
            width: 35px;
            height: 35px;
            background-color: var(--color-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        
        .breadcrumb {
            margin-bottom: 20px;
            font-size: 14px;
            color: var(--color-dark-gray);
        }
        
        .breadcrumb a {
            color: var(--color-primary);
            text-decoration: none;
        }
        
        .breadcrumb a:hover {
            text-decoration: underline;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: var(--color-white);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            flex-grow: 1;
            position: relative;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: var(--color-black);
            font-size: 32px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--color-black);
        }
        
        input[type="text"],
        input[type="email"],
        select,
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background-color: var(--color-light-gray);
            color: var(--color-black);
            font-size: 16px;
        }
        
        textarea {
            min-height: 150px;
            resize: vertical;
        }
        
        .required::after {
            content: "*";
            color: red;
            margin-left: 3px;
        }
        
        .selection-options {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }
        
        .selection-option {
            flex: 1;
            text-align: center;
            padding: 15px;
            background-color: var(--color-light-gray);
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        .selection-option.selected {
            background-color: var(--color-primary);
            font-weight: bold;
        }
        
        .btn-enviar {
            width: 100%;
            padding: 15px;
            background-color: var(--color-primary);
            color: var(--color-black);
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 18px;
            margin-top: 20px;
            transition: background-color 0.3s;
        }
        
        .btn-enviar:hover {
            background-color: #f88a9d;
        }
        
        /* Estilos para el mensaje de éxito */
        .success-message {
            display: none;
            text-align: center;
            padding: 30px;
            background-color: rgba(76, 175, 80, 0.1);
            border-radius: 10px;
            margin-top: 20px;
        }
        
        .success-icon {
            font-size: 60px;
            color: var(--color-success);
            margin-bottom: 20px;
        }
        
        .btn-nuevo {
            padding: 12px 25px;
            background-color: var(--color-primary);
            color: var(--color-black);
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            margin-top: 20px;
            transition: background-color 0.3s;
        }
        
        .btn-nuevo:hover {
            background-color: #f88a9d;
        }
        
        footer {
            background-color: var(--color-primary);
            padding: 30px 20px;
            text-align: center;
            margin-top: 30px;
            border-radius: 8px;
        }
        
        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .social-section {
            margin-bottom: 20px;
            width: 100%;
        }
        
        .social-section h2 {
            font-size: 24px;
            margin-bottom: 25px;
            color: var(--color-black);
            border-bottom: 2px solid var(--color-black);
            padding-bottom: 10px;
            display: inline-block;
        }
        
        .social-links {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .social-link {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--color-black);
            text-decoration: none;
            padding: 15px;
            background-color: var(--color-white);
            border-radius: 8px;
            transition: transform 0.3s, background-color 0.3s;
            min-width: 120px;
        }
        
        .social-link:hover {
            background-color: var(--color-light-gray);
            transform: translateY(-5px);
        }
        
        .social-icon {
            font-size: 30px;
            margin-bottom: 10px;
        }
        
        .copyright {
            color: var(--color-black);
            font-weight: 500;
            border-top: 1px solid var(--color-black);
            padding-top: 20px;
            width: 100%;
        }
        
        @media (max-width: 768px) {
            .selection-options {
                flex-direction: column;
            }
            
            .social-links {
                gap: 10px;
            }
            
            .social-link {
                min-width: 100px;
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="showpass">SHOWPA$$</div>
        <div class="profile">
            <div class="profile-icon">U</div>
            <span>Perfil</span>
        </div>
    </div>
    
    <div class="breadcrumb">
        <a href="3paginaprincipal.html">Home</a> > PQRS
    </div>
    
    <div class="container">
        <h1>PQRS</h1>
        
        <div id="formulario-pqrs">
            <div class="form-group">
                <label for="nombres" class="required">Nombres y apellidos</label>
                <input type="text" id="nombres" required>
            </div>
            
            <div class="form-group">
                <label for="correo" class="required">Correo electrónico</label>
                <input type="email" id="correo" required>
            </div>
            
            <div class="form-group">
                <label>Selección</label>
                <div class="selection-options">
                    <div class="selection-option selected" onclick="seleccionarTipo('peticiones')">Peticiones</div>
                    <div class="selection-option" onclick="seleccionarTipo('quejas')">Quejas</div>
                    <div class="selection-option" onclick="seleccionarTipo('reclamos')">Reclamos</div>
                </div>
            </div>
            
            <div class="form-group">
                <label for="motivo" class="required">Motivo</label>
                <textarea id="motivo" required placeholder="Por favor, describe tu petición, queja o reclamo en detalle"></textarea>
            </div>
            
            <button class="btn-enviar" onclick="enviarFormulario()">Enviar</button>
        </div>
        
        <div id="mensaje-exito" class="success-message">
            <div class="success-icon">✓</div>
            <h2>¡PQRS Enviado con Éxito!</h2>
            <p>Hemos recibido tu <span id="tipo-enviado">petición</span> correctamente.</p>
            <p>Nos pondremos en contacto contigo en la dirección <strong id="correo-enviado"></strong> en un plazo máximo de 5 días hábiles.</p>
            <button class="btn-nuevo" onclick="nuevoFormulario()">Enviar otro PQRS</button>
        </div>
    </div>
    
    <footer>
        <div class="footer-content">
            <div class="social-section">
                <h2>Síguenos en Redes Sociales</h2>
                <div class="social-links">
                    <a href="#" class="social-link">
                        <span>Facebook</span>
                    </a>
                    <a href="#" class="social-link">
                        <span>Instagram</span>
                    </a>
                    <a href="#" class="social-link">
                        <span>Tiktok</span>
                    </a>
                    <a href="#" class="social-link">
                        <span>Teléfono</span>
                    </a>
                </div>
            </div>
        </div>
    </footer>

    <script>
        let tipoSeleccionado = 'peticiones';
        
        function seleccionarTipo(tipo) {
            tipoSeleccionado = tipo;
            document.querySelectorAll('.selection-option').forEach(opcion => {
                opcion.classList.remove('selected');
            });
            event.target.classList.add('selected');
        }
        
        function validarFormulario() {
            const nombres = document.getElementById('nombres').value;
            const correo = document.getElementById('correo').value;
            const motivo = document.getElementById('motivo').value;
            
            if (!nombres.trim()) {
                alert('Por favor, ingresa tus nombres y apellidos.');
                return false;
            }
            
            if (!correo.trim()) {
                alert('Por favor, ingresa tu correo electrónico.');
                return false;
            }
            
            if (!motivo.trim()) {
                alert('Por favor, describe el motivo de tu PQRS.');
                return false;
            }
            
            return true;
        }
        
        function enviarFormulario() {
            if (!validarFormulario()) return;
            
            // Ocultar formulario y mostrar mensaje de éxito
            document.getElementById('formulario-pqrs').style.display = 'none';
            document.getElementById('mensaje-exito').style.display = 'block';
            
            // Mostrar información del envío
            document.getElementById('tipo-enviado').textContent = tipoSeleccionado;
            document.getElementById('correo-enviado').textContent = document.getElementById('correo').value;
        }
        
        function nuevoFormulario() {
            // Restablecer formulario
            document.getElementById('nombres').value = '';
            document.getElementById('correo').value = '';
            document.getElementById('motivo').value = '';
            
            // Restablecer selección
            document.querySelectorAll('.selection-option').forEach(opcion => {
                opcion.classList.remove('selected');
            });
            document.querySelectorAll('.selection-option')[0].classList.add('selected');
            tipoSeleccionado = 'peticiones';
            
            // Mostrar formulario y ocultar mensaje de éxito
            document.getElementById('mensaje-exito').style.display = 'none';
            document.getElementById('formulario-pqrs').style.display = 'block';
        }
    </script>
</body>
</html>
